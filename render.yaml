## ─────────────────────────────────────────────────────────────────────────────
## Render Blueprint — HamyonAI Bot
##
## BITTA web service:
##   - Django admin panel  → https://hamyon-web.onrender.com/admin/
##   - Telegram bot polling → start.sh da gunicorn bilan birga
##
## ENV o'zgaruvchilar (Render dashboard da to'ldiring):
##   TELEGRAM_BOT_TOKEN, GEMINI_API_KEY, ADMIN_IDS, DATABASE_URL
## ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: hamyon-web
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    healthCheckPath: /admin/login/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hamyon-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ADMIN_IDS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: hamyon-db
    databaseName: hamyon_bot
    user: hamyon_user
    region: frankfurt
    plan: basic_256mb
